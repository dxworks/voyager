on:
  push:
    tags:
      - 'v*'

name: Create Release

jobs:
  build-v1:
    name: Build Voyager1 Base Package
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.semver_parser.outputs.semver }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'
          cache: 'maven'

      - name: Extract Semver
        id: semver_parser
        run: |
          semver=${TAG#"refs/tags/v"}
          semver=${semver%"-voyager"}
          echo "semver=$semver" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ github.ref }}

      - name: Fill Version
        run: |
          tag=${{ steps.semver_parser.outputs.semver }}
          sed -i "s/\$tag_version/$tag/" dx-voyager/pom.xml

      - name: Build
        run: mvn package

      - name: Prepare Assets
        run: |
          mkdir -p voyager
          cp README.md voyager/README.md
          cp .config.yml voyager/.config.yml
          cp .doctor.yml voyager/.doctor.yml
          cp mission.yml voyager/mission.yml
          cp bin/voyager.sh voyager/voyager.sh
          chmod +x voyager/voyager.sh
          cp bin/voyager.bat voyager/voyager.bat
          cp -r instruments voyager/instruments
          cp dx-voyager/target/dx-voyager.jar voyager/dx-voyager.jar

      - name: Upload Voyager1 base package
        uses: actions/upload-artifact@v4
        with:
          name: voyager-base
          path: voyager

  build-v2-win-x64:
    name: Build Voyager2 Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout voyager2 branch
        uses: actions/checkout@v4
        with:
          ref: voyager2
          path: voyager2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'npm'
          cache-dependency-path: voyager2/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dxworks'

      - name: Build Voyager2 SEA executable
        run: |
          npm ci
          npm run build:sea
        working-directory: voyager2
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Voyager2 Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: voyager2-win-x64
          path: voyager2/dist/sea/dx-voyager-win-x64.exe

  build-v2-linux-x64:
    name: Build Voyager2 Linux x64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout voyager2 branch
        uses: actions/checkout@v4
        with:
          ref: voyager2
          path: voyager2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'npm'
          cache-dependency-path: voyager2/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dxworks'

      - name: Build Voyager2 SEA executable
        run: |
          npm ci
          npm run build:sea
        working-directory: voyager2
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Voyager2 Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: voyager2-linux-x64
          path: voyager2/dist/sea/dx-voyager-linux-x64

  build-v2-macos-x64:
    name: Build Voyager2 macOS x64
    runs-on: macos-13
    steps:
      - name: Checkout voyager2 branch
        uses: actions/checkout@v4
        with:
          ref: voyager2
          path: voyager2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'npm'
          cache-dependency-path: voyager2/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dxworks'

      - name: Build Voyager2 SEA executable
        run: |
          npm ci
          npm run build:sea
        working-directory: voyager2
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Voyager2 macOS x64 binary
        uses: actions/upload-artifact@v4
        with:
          name: voyager2-macos-x64
          path: voyager2/dist/sea/dx-voyager-macos-x64

  build-v2-macos-arm64:
    name: Build Voyager2 macOS arm64
    runs-on: macos-14
    steps:
      - name: Checkout voyager2 branch
        uses: actions/checkout@v4
        with:
          ref: voyager2
          path: voyager2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: 'npm'
          cache-dependency-path: voyager2/package-lock.json
          registry-url: 'https://npm.pkg.github.com'
          scope: '@dxworks'

      - name: Build Voyager2 SEA executable
        run: |
          npm ci
          npm run build:sea
        working-directory: voyager2
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Voyager2 macOS arm64 binary
        uses: actions/upload-artifact@v4
        with:
          name: voyager2-macos-arm64
          path: voyager2/dist/sea/dx-voyager-macos-arm64

  package-release:
    name: Package And Publish Release
    runs-on: ubuntu-latest
    needs:
      - build-v1
      - build-v2-win-x64
      - build-v2-linux-x64
      - build-v2-macos-x64
      - build-v2-macos-arm64
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Voyager1 base package
        uses: actions/download-artifact@v4
        with:
          name: voyager-base
          path: release

      - name: Download Voyager2 Windows x64 binary
        uses: actions/download-artifact@v4
        with:
          name: voyager2-win-x64
          path: artifacts/v2-win-x64

      - name: Download Voyager2 Linux x64 binary
        uses: actions/download-artifact@v4
        with:
          name: voyager2-linux-x64
          path: artifacts/v2-linux-x64

      - name: Download Voyager2 macOS x64 binary
        uses: actions/download-artifact@v4
        with:
          name: voyager2-macos-x64
          path: artifacts/v2-macos-x64

      - name: Download Voyager2 macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: voyager2-macos-arm64
          path: artifacts/v2-macos-arm64

      - name: Assemble release archive structure
        run: |
          mkdir -p release/voyager
          cp artifacts/v2-win-x64/dx-voyager-win-x64.exe release/voyager/
          cp artifacts/v2-linux-x64/dx-voyager-linux-x64 release/voyager/
          cp artifacts/v2-macos-x64/dx-voyager-macos-x64 release/voyager/
          cp artifacts/v2-macos-arm64/dx-voyager-macos-arm64 release/voyager/
          chmod +x release/voyager/voyager.sh
          chmod +x release/voyager/dx-voyager-linux-x64
          chmod +x release/voyager/dx-voyager-macos-x64
          chmod +x release/voyager/dx-voyager-macos-arm64

      - name: Create Archive
        run: |
          cd release
          zip -r ../dx-voyager.zip voyager

      - name: Prepare Release Notes
        run: |
          mkdir -p releaseNotes
          touch ${{ github.workspace }}/releaseNotes/v${{ needs.build-v1.outputs.semver }}.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Voyager ${{ needs.build-v1.outputs.semver }}
          body_path: ${{ github.workspace }}/releaseNotes/v${{ needs.build-v1.outputs.semver }}.md
          body: ""
          prerelease: false
          draft: false
          fail_on_unmatched_files: true
          files: dx-voyager.zip

      - name: Trigger Repository Dispatch Voyager Full Instrument Build
        uses: peter-evans/repository-dispatch@v1
        with:
          repository: dxworks/voyager
          token: ${{ secrets.GH_TOKEN }}
          event-type: voyager-release
