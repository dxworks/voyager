name: Test Release Asset Download

on:
  workflow_dispatch:
    inputs:
      release_repo:
        description: Repository that owns the release
        required: true
        default: dxworks/voyager
      release_tag:
        description: Release tag
        required: true
        default: v2.0.0
      release_asset:
        description: Asset file name
        required: true
        default: voyager2-full.zip

permissions:
  contents: write

jobs:
  test-download:
    runs-on: ubuntu-latest
    steps:
      - name: Show inputs
        run: |
          echo "repo=${{ inputs.release_repo }}"
          echo "tag=${{ inputs.release_tag }}"
          echo "asset=${{ inputs.release_asset }}"

      - name: Find and download asset (supports draft)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'

          $repo = "${{ inputs.release_repo }}"
          $tag = "${{ inputs.release_tag }}"
          $assetName = "${{ inputs.release_asset }}"

          $downloadDir = Join-Path $env:RUNNER_TEMP "release-asset"
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null

          $releasesJson = gh api "repos/$repo/releases" --paginate
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to list releases for $repo"
          }

          $releases = $releasesJson | ConvertFrom-Json
          if (-not $releases) {
            throw "No releases returned for $repo"
          }

          $release = $releases | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1
          if (-not $release) {
            $sample = ($releases | Select-Object -First 20 | ForEach-Object { $_.tag_name }) -join ", "
            throw "Tag '$tag' not found in '$repo'. First tags seen: $sample"
          }

          $asset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) {
            $assets = ($release.assets | ForEach-Object { $_.name }) -join ", "
            throw "Asset '$assetName' not found in tag '$tag'. Assets: $assets"
          }

          $zipPath = Join-Path $downloadDir $assetName
          gh api -H "Accept: application/octet-stream" "repos/$repo/releases/assets/$($asset.id)" > $zipPath
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download asset id $($asset.id)"
          }

          if (-not (Test-Path $zipPath)) {
            throw "Downloaded file not found: $zipPath"
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "release-unpacked"
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          Write-Host "Download OK: $zipPath"
          Write-Host "Extracted to: $extractDir"
          Get-ChildItem -Path $extractDir

      - name: Upload downloaded content for inspection
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-debug
          path: |
            ${{ runner.temp }}/release-asset
            ${{ runner.temp }}/release-unpacked
