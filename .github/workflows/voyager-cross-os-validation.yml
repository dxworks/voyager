name: Voyager Cross OS Validation

on:
  workflow_dispatch:
    inputs:
      release_repo:
        description: Repository that owns the release
        required: true
        default: dxworks/voyager
      release_tag:
        description: Voyager2 release tag containing voyager2-full bundle
        required: true
        default: v2.0.0
      release_asset:
        description: Release asset zip file name
        required: true
        default: voyager2-full.zip

permissions:
  contents: write

jobs:
  define-matrix:
    name: Define OS Matrix
    runs-on: ubuntu-latest
    outputs:
      oses: ${{ steps.set-matrix.outputs.oses }}
    steps:
      - name: Set matrix outputs
        id: set-matrix
        shell: bash
        run: |
          echo 'oses=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"

  validate:
    name: Validate on ${{ matrix.os }}
    needs: define-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.define-matrix.outputs.oses) }}
    steps:
      - name: Checkout Voyager2 branch
        uses: actions/checkout@v4
        with:
          ref: voyager2
          path: voyager2-src

      - name: Checkout Voyager1 branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: main
          path: voyager1-src

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '25.x'
          cache: npm
          cache-dependency-path: voyager2-src/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@dxworks'

      - name: Build Voyager1
        shell: bash
        run: mvn -B -DskipTests package
        working-directory: voyager1-src

      - name: Build Voyager2
        shell: bash
        run: |
          npm ci
          npm run build
        working-directory: voyager2-src
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare workspace
        shell: pwsh
        run: |
          $workspace = Join-Path $env:RUNNER_TEMP "voyager-cross-os"
          if (Test-Path $workspace) {
            Remove-Item -Path $workspace -Recurse -Force
          }
          New-Item -ItemType Directory -Path $workspace | Out-Null

          "PARITY_WORKSPACE=$workspace" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Download instruments from Voyager2 release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'

          $repo = "${{ inputs.release_repo }}"
          $tag = "${{ inputs.release_tag }}"
          $assetName = "${{ inputs.release_asset }}"

          $downloadDir = Join-Path $env:PARITY_WORKSPACE "release-asset"
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null

          $releasesJson = gh api "repos/$repo/releases" --paginate
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to list releases for repository '$repo'"
          }

          $releases = $releasesJson | ConvertFrom-Json
          $release = $releases | Where-Object { $_.tag_name -eq $tag } | Select-Object -First 1
          if (-not $release) {
            throw "Release with tag '$tag' not found in repository '$repo'"
          }

          $asset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) {
            throw "Asset '$assetName' not found in release '$tag'"
          }

          $zipPath = Join-Path $downloadDir $assetName
          gh api -H "Accept: application/octet-stream" "repos/$repo/releases/assets/$($asset.id)" > $zipPath
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to download release asset '$assetName' from release '$tag'"
          }

          if (-not (Test-Path $zipPath)) {
            throw "Release asset not found at expected path: $zipPath"
          }

          $extractDir = Join-Path $env:PARITY_WORKSPACE "release-unpacked"
          Expand-Archive -Path $zipPath -DestinationPath $extractDir -Force

          $candidateA = Join-Path $extractDir "voyager2-full"
          $candidateB = Join-Path $extractDir "voyager"
          if (Test-Path $candidateA) {
            $releaseRoot = $candidateA
          } elseif (Test-Path $candidateB) {
            $releaseRoot = $candidateB
          } else {
            throw "Could not find voyager2-full or voyager directory in extracted release asset"
          }

          $sourceInstruments = Join-Path $releaseRoot "instruments"
          if (-not (Test-Path $sourceInstruments)) {
            throw "Expected instruments folder not found in release asset: $sourceInstruments"
          }

          $targetInstruments = Join-Path $env:PARITY_WORKSPACE "instruments"
          New-Item -ItemType Directory -Path $targetInstruments -Force | Out-Null
          Copy-Item -Path (Join-Path $sourceInstruments "*") -Destination $targetInstruments -Recurse -Force

          @"
          mission: cross-os-validation
          target: ./targets
          "@ | Set-Content -Path (Join-Path $env:PARITY_WORKSPACE "mission.yml") -Encoding UTF8

      - name: Validate dual-manifest instruments
        shell: pwsh
        run: |
          $instrumentDirs = Get-ChildItem -Path (Join-Path $env:PARITY_WORKSPACE "instruments") -Directory
          if ($instrumentDirs.Count -eq 0) {
            throw "No instrument directories found in instruments folder"
          }

          $invalid = @()
          foreach ($dir in $instrumentDirs) {
            $v1 = Join-Path $dir.FullName "instrument.yml"
            $v2 = Join-Path $dir.FullName "instrument.v2.yml"
            if (-not (Test-Path $v1) -or -not (Test-Path $v2)) {
              $invalid += $dir.Name
            }
          }

          if ($invalid.Count -gt 0) {
            throw "Instruments missing either instrument.yml or instrument.v2.yml: $($invalid -join ', ')"
          }

      - name: Clone target repositories
        shell: pwsh
        run: |
          $targetsDir = Join-Path $env:PARITY_WORKSPACE "targets"
          New-Item -ItemType Directory -Path $targetsDir -Force | Out-Null

          $repos = @(
            @{ Name = "java"; Url = "https://github.com/Shivanshu1511/springboot-rest-api.git" },
            @{ Name = "python"; Url = "https://github.com/theArjun/git-commits.git" },
            @{ Name = "js-ts"; Url = "https://github.com/tkonsta/github_code_search_with_repo_prefix.git" },
            @{ Name = "c-cpp"; Url = "https://github.com/francisrstokes/tiny-c-projects.git" },
            @{ Name = "csharp"; Url = "https://github.com/oseifrimpongg/easy-csharp-projects.git" }
          )

          foreach ($repo in $repos) {
            git clone --depth 1 $repo.Url (Join-Path $targetsDir $repo.Name)
          }

      - name: Run Voyager1
        shell: pwsh
        run: |
          Push-Location $env:PARITY_WORKSPACE
          $jarPath = Join-Path $env:GITHUB_WORKSPACE "voyager1-src/dx-voyager/target/dx-voyager.jar"
          java -Xmx8g -jar $jarPath "mission.yml"

          $defaultZip = Join-Path $env:PARITY_WORKSPACE "cross-os-validation-voyager-results.zip"
          if (-not (Test-Path $defaultZip)) {
            throw "Voyager1 did not produce expected archive: $defaultZip"
          }

          Move-Item -Path $defaultZip -Destination (Join-Path $env:PARITY_WORKSPACE "v1-results.zip") -Force

          $missionLog = Join-Path $env:PARITY_WORKSPACE "cross-os-validation.log"
          if (Test-Path $missionLog) {
            Move-Item -Path $missionLog -Destination (Join-Path $env:PARITY_WORKSPACE "v1-mission.log") -Force
          }
          Pop-Location

      - name: Run Voyager2
        shell: pwsh
        run: |
          Push-Location $env:PARITY_WORKSPACE
          $voyager2Cli = Join-Path $env:GITHUB_WORKSPACE "voyager2-src/dist/src/voyager.js"
          node $voyager2Cli run -m "mission.yml"

          $defaultZip = Join-Path $env:PARITY_WORKSPACE "cross-os-validation-voyager-results.zip"
          if (-not (Test-Path $defaultZip)) {
            throw "Voyager2 did not produce expected archive: $defaultZip"
          }

          Move-Item -Path $defaultZip -Destination (Join-Path $env:PARITY_WORKSPACE "v2-results.zip") -Force

          $missionLog = Join-Path $env:PARITY_WORKSPACE "cross-os-validation.log"
          if (Test-Path $missionLog) {
            Move-Item -Path $missionLog -Destination (Join-Path $env:PARITY_WORKSPACE "v2-mission.log") -Force
          }
          Pop-Location

      - name: Compare instrument outputs
        shell: pwsh
        run: |
          $compareScriptPath = Join-Path $env:PARITY_WORKSPACE "compare-instruments.js"
          @'
          const fs = require('fs')
          const path = require('path')
          const crypto = require('crypto')

          const AdmZip = require(path.resolve(process.argv[6], 'node_modules', 'adm-zip'))
          const yaml = require(path.resolve(process.argv[6], 'node_modules', 'js-yaml'))

          const v1ZipPath = process.argv[2]
          const v2ZipPath = process.argv[3]
          const instrumentsDir = process.argv[4]
          const reportPath = process.argv[5]

          function sha256(buffer) {
            return crypto.createHash('sha256').update(buffer).digest('hex')
          }

          function getInstrumentMappings(baseDir) {
            const dirs = fs.readdirSync(baseDir, { withFileTypes: true }).filter(d => d.isDirectory())
            const missing = []
            const mappings = []

            for (const dir of dirs) {
              const current = path.join(baseDir, dir.name)
              const v1Manifest = path.join(current, 'instrument.yml')
              const v2Manifest = path.join(current, 'instrument.v2.yml')
              if (!fs.existsSync(v1Manifest) || !fs.existsSync(v2Manifest)) {
                missing.push(dir.name)
                continue
              }

              const v1Config = yaml.load(fs.readFileSync(v1Manifest, 'utf8')) || {}
              const v2Config = yaml.load(fs.readFileSync(v2Manifest, 'utf8')) || {}

              const v1Name = String(v1Config.name || '').trim()
              const v2Key = String(v2Config.id || v2Config.name || '').trim()

              if (!v1Name || !v2Key) {
                throw new Error(`Missing instrument name in ${dir.name}`)
              }

              mappings.push({
                folder: dir.name,
                v1Key: v1Name,
                v2Key: v2Key,
              })
            }

            if (missing.length > 0) {
              throw new Error(`Missing dual manifests for: ${missing.join(', ')}`)
            }
            return mappings
          }

          function buildManifestForInstrument(zip, instrumentKey) {
            const entries = zip.getEntries()
            const manifest = new Map()
            const prefix = `${instrumentKey}/`

            for (const entry of entries) {
              if (entry.isDirectory) continue
              const name = entry.entryName.replace(/\\/g, '/')
              if (!name.startsWith(prefix)) continue
              const relativePath = name.slice(prefix.length)
              if (!relativePath) continue

              const content = entry.getData()
              manifest.set(relativePath, sha256(content))
            }

            return manifest
          }

          function compareSubset(v1Manifest, v2Manifest) {
            const missingInB = []
            const hashMismatch = []

            for (const [file, hash] of v1Manifest.entries()) {
              if (!v2Manifest.has(file)) {
                missingInB.push(file)
                continue
              }
              if (v2Manifest.get(file) !== hash) {
                hashMismatch.push(file)
              }
            }

            return { missingInB, hashMismatch }
          }

          const instrumentMappings = getInstrumentMappings(instrumentsDir)
          if (instrumentMappings.length === 0) {
            throw new Error('No instruments found to compare')
          }

          const v1Zip = new AdmZip(v1ZipPath)
          const v2Zip = new AdmZip(v2ZipPath)

          const missingInV2 = []
          const hashMismatches = []
          const perInstrumentStats = []

          for (const mapping of instrumentMappings) {
            const v1Manifest = buildManifestForInstrument(v1Zip, mapping.v1Key)
            const v2Manifest = buildManifestForInstrument(v2Zip, mapping.v2Key)
            const diff = compareSubset(v1Manifest, v2Manifest)

            perInstrumentStats.push(
              `${mapping.folder}: v1='${mapping.v1Key}' files=${v1Manifest.size}, v2='${mapping.v2Key}' files=${v2Manifest.size}`
            )

            for (const file of diff.missingInB) {
              missingInV2.push(`${mapping.v1Key}/${file} (expected in v2 under ${mapping.v2Key}/${file})`)
            }
            for (const file of diff.hashMismatch) {
              hashMismatches.push(`${mapping.v1Key}/${file} (v2: ${mapping.v2Key}/${file})`)
            }
          }

          const reportLines = [
            `Instrument count: ${instrumentMappings.length}`,
            `Missing in V2: ${missingInV2.length}`,
            `Hash mismatches: ${hashMismatches.length}`,
            '',
            'Per instrument coverage:',
            ...perInstrumentStats.sort(),
          ]

          if (missingInV2.length > 0) {
            reportLines.push('', 'Files missing in V2:', ...missingInV2.sort())
          }
          if (hashMismatches.length > 0) {
            reportLines.push('', 'Files with different content:', ...hashMismatches.sort())
          }

          fs.writeFileSync(reportPath, reportLines.join('\n'))
          console.log(reportLines.join('\n'))

          const hasDifferences = missingInV2.length > 0 || hashMismatches.length > 0
          if (hasDifferences) {
            process.exit(1)
          }
          '@ | Set-Content -Path $compareScriptPath -Encoding UTF8

          node $compareScriptPath `
            (Join-Path $env:PARITY_WORKSPACE "v1-results.zip") `
            (Join-Path $env:PARITY_WORKSPACE "v2-results.zip") `
            (Join-Path $env:PARITY_WORKSPACE "instruments") `
            (Join-Path $env:PARITY_WORKSPACE "comparison-report.txt") `
            (Join-Path $env:GITHUB_WORKSPACE "voyager2-src")

      - name: Upload validation artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: voyager-cross-os-validation-${{ matrix.os }}
          path: |
            ${{ env.PARITY_WORKSPACE }}/v1-results.zip
            ${{ env.PARITY_WORKSPACE }}/v2-results.zip
            ${{ env.PARITY_WORKSPACE }}/comparison-report.txt
            ${{ env.PARITY_WORKSPACE }}/v1-mission.log
            ${{ env.PARITY_WORKSPACE }}/v2-mission.log
